<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Slide Sync</h1>

    <div id="inactive-view">
      <div class="status disconnected">
        <span class="dot"></span>
        Sem sessao ativa
      </div>
      <p class="hint">Abra uma apresentacao no Google Slides para comecar.</p>
    </div>

    <div id="active-view" class="hidden">
      <div class="status connected">
        <span class="dot"></span>
        Sessao ativa
      </div>
      <div class="room-code">
        <div class="label">Codigo da sala</div>
        <div class="code" id="roomCode">------</div>
      </div>
      <div class="info-row">
        <span class="label">Slide atual</span>
        <span id="currentSlide" class="value">-</span>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
